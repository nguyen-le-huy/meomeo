version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meomeo-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./server/.env
    networks:
      - meomeo-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://meomeo-api.devenir.shop/api
    container_name: meomeo-client
    restart: always
    ports:
      - "5180:80"
    depends_on:
      - server
    networks:
      - meomeo-network

networks:
  meomeo-network:
